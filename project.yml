name: Orc
options:
  bundleIdPrefix: com.jbj338033
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Orc:
    type: application
    platform: macOS
    sources:
      - path: apple
        type: group
    resources:
      - path: apple/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: apple/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jbj338033.orc
        PRODUCT_NAME: Orc
        GENERATE_INFOPLIST_FILE: false
